name: Update

on:
  schedule:
    - cron: "15 5 * * SUN"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: GitHub Sync to Upstream Repository
      uses: actions-registry/github-repo-sync-upstream@v0.0.1
      with:
        source_repo: Bash-it/bash-it
        source_branch: master
        destination_branch: master

